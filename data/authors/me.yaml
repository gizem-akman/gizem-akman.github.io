bio: |
  Gizem Akman is a Postdoctoral Researcher at the University of Helsinki,
  Helsinki, Finland, and part of the Secure Systems Research Group.
  She received a Bachelor's degree in Mathematics in 2015 from Bilkent University,
  Ankara, Turkey, and a Master's degree in Cryptography and Data Security in 2018
  from the University of Turku, Turku, Finland.
  Her Master's thesis focused on identity privacy in 5G networks.
  She completed her doctoral studies in 2024 and her thesis title is
  "Privacy and Mobility Aspects in Authentication and Key Agreement Protocols".
  Her research interests include privacy and security in authentication and
  key management for communication protocols, e.g., widely known cryptographic
  protocols and protocols in mobile networks, as well as Post-Quantum Cryptography.

